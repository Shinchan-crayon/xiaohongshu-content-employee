interface:
  display_name: "小红书内容员工"
  short_description: "两次模型调用后直接并发生图和交付"
  default_prompt: "使用 $xhs-content-employee 直接完成这批小红书内容。正常内容任务禁止进入开发模式：不扫描仓库、不建计划、不跑测试、不解释架构、不做 Prompt 二次复审、不截图验收。薄主控只派发一次无历史 Research Worker 和一次无历史 Compose Worker；Compose 在一次调用中把事实转成自然用户场景和具体收益，生成可直接发布的最终正文、至少 5 个候选标题和最终 Prompt，locked_terms 不得被强塞进成稿。完成后一次程序校验并立即展示 Prompt 包等待哈希批准。批准后直接并发生图，再用 --embed-images 生成内嵌图片 HTML、独立运行日志和内部 delivery.json；日志只汇总已有数据，不增加采集或检查。最终只返回 HTML 与运行日志两个文件链接。"
policy:
  allow_implicit_invocation: true
