interface:
  display_name: "小红书内容员工"
  short_description: "三次模型调用后自然化文案、并发生图和交付"
  default_prompt: "使用 $xhs-content-employee 直接完成这批小红书内容。正常内容任务禁止进入开发模式：不扫描仓库、不建计划、不跑测试、不解释架构、不做 Prompt 二次复审、不截图验收。薄主控只派发一次无历史 Research Worker、一次无历史 Compose Worker 和一次无历史 Humanize Worker；Compose 在一次调用中生成可直接发布的正文、至少 5 个候选标题和最终 Prompt，随后 Humanize 只改写 content.json 的可见文字一次，不改格式、JSON 结构或 visual.json，不做检测、报告、重试或二次复审。展示 Prompt 包等待哈希批准后，直接并发生图，再用 --embed-images 生成内嵌图片 HTML、独立运行日志和内部 delivery.json；日志只汇总已有数据，不增加采集或检查。最终只返回 HTML 与运行日志两个文件链接。"
policy:
  allow_implicit_invocation: true
